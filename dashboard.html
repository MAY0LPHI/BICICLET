<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Rápido - BICICLET</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="style.css" rel="stylesheet">
    <script src="libs/tailwind.min.js"></script>
    <script src="libs/lucide.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                            900: '#7c2d12',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-200">

    <!-- Navbar (Theme Aligned) -->
    <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-30 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-brand-500 rounded-lg text-white">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">Painel Expresso</h1>
                        <p class="text-xs text-slate-500 dark:text-slate-400" id="userName">Carregando...</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html"
                        class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-brand-500 dark:hover:text-brand-400 transition-colors">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Sistema Completo</span>
                    </a>
                    <div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
                    <button id="btnLogout"
                        class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"
                        title="Sair">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">

        <!-- Status Banner -->
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-500/10 dark:bg-brand-500/5 rounded-bl-full -z-0">
            </div>
            <div class="p-6 relative z-10 flex items-center justify-between">
                <div>
                    <h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
                        Status do Pátio</h2>
                    <div class="flex items-center gap-3">
                        <span id="ocupacaoCount" class="text-4xl font-black text-slate-900 dark:text-white">0</span>
                        <span class="text-slate-600 dark:text-slate-400 font-medium">bicicletas estacionadas
                            agora</span>
                    </div>
                </div>
                <div
                    class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-600">
                    <i data-lucide="bike" class="w-10 h-10 text-brand-500 opacity-80"></i>
                </div>
            </div>
        </div>

        <!-- Action Buttons (Massive Targets) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button id="btnCheckin"
                class="group relative bg-gradient-to-br from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white rounded-3xl p-8 shadow-lg shadow-green-500/30 transition-all transform hover:-translate-y-1 hover:shadow-xl hover:shadow-green-500/40 border border-green-400/20 overflow-hidden text-left">
                <div
                    class="absolute top-0 right-0 p-6 opacity-20 transform group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="log-in" class="w-32 h-32"></i>
                </div>
                <div class="relative z-10">
                    <div
                        class="bg-white/20 w-14 h-14 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-sm">
                        <i data-lucide="arrow-down-to-line" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-2">Dar Entrada</h2>
                    <p class="text-green-100 text-lg font-medium opacity-90">Registrar chegada de bicicleta</p>
                </div>
            </button>

            <button id="btnCheckout"
                class="group relative bg-gradient-to-br from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-3xl p-8 shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/40 border border-blue-400/20 overflow-hidden text-left">
                <div
                    class="absolute top-0 right-0 p-6 opacity-20 transform group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="log-out" class="w-32 h-32"></i>
                </div>
                <div class="relative z-10">
                    <div
                        class="bg-white/20 w-14 h-14 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-sm">
                        <i data-lucide="arrow-up-from-line" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-2">Finalizar Uso</h2>
                    <p class="text-blue-100 text-lg font-medium opacity-90">Liberar bicicleta e dar saída</p>
                </div>
            </button>
        </div>

        <!-- Recent Activity Feed -->
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
            <div
                class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                    <i data-lucide="history" class="w-5 h-5 text-slate-400"></i>
                    Últimas Movimentações
                </h3>
                <button onclick="window.location.reload()"
                    class="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg text-slate-500 transition-colors"
                    title="Atualizar dados">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="activityList"
                class="divide-y divide-slate-100 dark:divide-slate-700 max-h-[400px] overflow-y-auto">
                <!-- Loading Skeleton -->
                <div class="p-6 space-y-4 animate-pulse">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                        <div class="flex-1 space-y-2">
                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/4"></div>
                            <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Dar Entrada -->
    <div id="modalCheckin"
        class="fixed inset-0 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="min-h-screen px-4 text-center flex items-center justify-center">
            <div class="inline-block w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl text-left shadow-2xl transform transition-all scale-95 opacity-0"
                id="modalCheckinContent">

                <div
                    class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                        <i data-lucide="arrow-down-to-line" class="text-green-500 w-5 h-5"></i>
                        Registrar Entrada
                    </h3>
                    <button
                        class="modal-close text-slate-400 hover:text-slate-500 dark:hover:text-slate-300 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="p-6">
                    <form id="formCheckin" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Selecione
                                o Cliente / Bicicleta</label>
                            <div class="relative">
                                <!-- Search input style -->
                                <input type="text" id="searchClientInput" placeholder="Buscar por nome ou CPF..."
                                    class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow mb-2"
                                    autocomplete="off">
                                <i data-lucide="search" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>

                                <!-- Clients List Container for selection -->
                                <div id="clientsSelectList"
                                    class="max-h-60 overflow-y-auto w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm hidden absolute z-10 w-full">
                                    <div class="p-4 text-center text-sm text-slate-500">Buscando...</div>
                                </div>
                            </div>

                            <!-- Selected Bike Display (Hidden initially) -->
                            <div id="selectedClientDisplay"
                                class="hidden mt-3 p-3 bg-brand-50 dark:bg-slate-900/50 border border-brand-200 dark:border-slate-700 rounded-xl flex justify-between items-center">
                                <div>
                                    <p class="text-sm font-bold text-slate-800 dark:text-white" id="selectedClientName">
                                        -</p>
                                    <p class="text-xs text-slate-600 dark:text-slate-400 flex items-center gap-1 mt-1">
                                        <i data-lucide="bike" class="w-3 h-3"></i>
                                        <span id="selectedBikeDesc">-</span>
                                    </p>
                                </div>
                                <button type="button" id="clearSelectionBtn" class="text-slate-400 hover:text-red-500">
                                    <i data-lucide="x-circle" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <!-- Hidden inputs to store IDs -->
                            <input type="hidden" id="entryClientId">
                            <input type="hidden" id="entryBikeId">
                            <input type="hidden" id="entryClientCat">
                            <input type="hidden" id="entryBikeModel">
                            <input type="hidden" id="entryBikeBrand">
                            <input type="hidden" id="entryBikeColor">
                        </div>

                        <div class="pt-4 flex gap-3">
                            <button type="button"
                                class="modal-close flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium rounded-xl transition-colors">
                                Cancelar
                            </button>
                            <button type="submit" id="btnConfirmCheckin" disabled
                                class="flex-1 px-4 py-3 bg-green-500 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-colors shadow-sm shadow-green-500/20">
                                Confirmar Entrada
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Finalizar Uso -->
    <div id="modalCheckout"
        class="fixed inset-0 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="min-h-screen px-4 text-center flex items-center justify-center">
            <div class="inline-block w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl text-left shadow-2xl transform transition-all scale-95 opacity-0"
                id="modalCheckoutContent">

                <div
                    class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                        <i data-lucide="arrow-up-from-line" class="text-blue-500 w-5 h-5"></i>
                        Finalizar Uso
                    </h3>
                    <button
                        class="modal-close text-slate-400 hover:text-slate-500 dark:hover:text-slate-300 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="p-6">
                    <form id="formCheckout" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Quem está
                                saindo?</label>
                            <p class="text-xs text-slate-500 mb-3">Selecione na lista abaixo apenas as bicicletas que
                                estão no pátio agora.</p>

                            <div class="relative">
                                <!-- Search input style for parked bikes -->
                                <input type="text" id="searchParkedInput" placeholder="Buscar bicicleta no pátio..."
                                    class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow mb-2"
                                    autocomplete="off">
                                <i data-lucide="search" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>

                                <div id="parkedSelectList"
                                    class="max-h-60 overflow-y-auto w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm block">
                                    <div class="p-4 text-center text-sm text-slate-500">Carregando pátio...</div>
                                </div>
                            </div>

                            <!-- Hidden inputs to store IDs -->
                            <input type="hidden" id="exitRegistroId">
                        </div>

                        <div class="pt-4 flex gap-3">
                            <button type="button"
                                class="modal-close flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium rounded-xl transition-colors">
                                Cancelar
                            </button>
                            <button type="submit" id="btnConfirmCheckout" disabled
                                class="flex-1 px-4 py-3 bg-blue-500 hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-colors shadow-sm shadow-blue-500/20">
                                Confirmar Saída
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts em ES Module Style -->
    <script type="module">
        import { Auth } from './js/shared/auth.js';
        import { Storage } from './js/shared/storage.js';
        import { Utils } from './js/shared/utils.js';
        import { notificationManager } from './js/shared/notifications.js';

        // -------------------------
        // Estado e Lógica da Aplicação
        // -------------------------
        class DashboardApp {
            constructor() {
                this.userData = null;
                this.allClients = [];
                this.allRegistros = [];
                this.activeRegistros = [];
            }

            async init() {
                // 1. Valida a autenticação antes de tudo
                if (!Auth.isLoggedIn()) {
                    window.location.href = '/login.html';
                    return;
                }
                this.userData = Auth.getCurrentSession();
                document.getElementById('userName').textContent = `${this.userData.nome} (${this.userData.tipo})`;

                // 2. Inicializa os subsistemas do painel
                lucide.createIcons();
                this.setupTheme();
                this.setupModals();
                this.setupLogout();

                // 3. Carrega os dados e renderiza a interface
                await this.refreshData();
                this.setupCheckinSearch();
                this.setupCheckoutSearch();
            }

            setupTheme() {
                // Usa a configuração global de tema do localStorage (se disponível)
                const savedTheme = localStorage.getItem('biciclet_theme');
                if (savedTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else if (savedTheme === 'light') {
                    document.documentElement.classList.remove('dark');
                } else {
                    // Sem preferência salva: usa a preferência do sistema operacional
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        document.documentElement.classList.add('dark');
                    }
                }
            }

            async refreshData() {
                // Busca dados do armazenamento real (localStorage/Electron)
                this.allClients = await Storage.loadClients();
                this.allRegistros = (await Storage.loadRegistros()) || [];

                // Filtra apenas o que está atualmente estacionado no pátio
                this.activeRegistros = this.allRegistros.filter(r => !r.dataHoraSaida && !r.acessoRemovido);

                this.renderStatus();
                this.renderActivityFeed();
            }

            renderStatus() {
                const countDisplay = document.getElementById('ocupacaoCount');
                countDisplay.textContent = this.activeRegistros.length;
            }

            renderActivityFeed() {
                const feedContainer = document.getElementById('activityList');

                // Obtém as últimas 8 ações (combinando entradas e saídas)
                let activities = [];

                this.allRegistros.forEach(r => {
                    const client = this.allClients.find(c => c.id === r.clientId) || { nome: 'Desconhecido', cpf: '000.000' };

                    // Adiciona evento de entrada
                    activities.push({
                        type: 'entrada',
                        time: new Date(r.dataHoraEntrada),
                        record: r,
                        client: client
                    });

                    // Adiciona evento de saída, se existir
                    if (r.dataHoraSaida) {
                        activities.push({
                            type: 'saida',
                            time: new Date(r.dataHoraSaida),
                            record: r,
                            client: client
                        });
                    }
                });

                // Ordena da atividade mais recente para a mais antiga
                activities.sort((a, b) => b.time - a.time);
                activities = activities.slice(0, 8); // Exibe as 8 atividades mais recentes

                // Renderiza a lista de atividades no feed
                if (activities.length === 0) {
                    feedContainer.innerHTML = '<div class="p-6 text-center text-slate-500 dark:text-slate-400">Nenhuma movimentação hoje.</div>';
                    return;
                }

                feedContainer.innerHTML = activities.map(act => {
                    const isEntry = act.type === 'entrada';
                    const iconColor = isEntry ? 'text-green-500 bg-green-50 dark:bg-green-500/10' : 'text-blue-500 bg-blue-50 dark:bg-blue-500/10';
                    const iconName = isEntry ? 'arrow-down-to-line' : 'arrow-up-from-line';
                    const timeStr = act.time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    const bikeDesc = act.record.bikeSnapshot ? `${act.record.bikeSnapshot.modelo} (${act.record.bikeSnapshot.marca})` : 'Bicicleta não detalhada';

                    return `
                        <div class="px-6 py-4 flex items-center gap-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${iconColor}">
                                <i data-lucide="${iconName}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate">${act.client.nome}</p>
                                <p class="text-xs text-slate-500 dark:text-slate-400 truncate">
                                    <i data-lucide="bike" class="w-3 h-3 inline mr-0.5"></i> ${bikeDesc}
                                </p>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="text-xs font-semibold ${isEntry ? 'text-green-600 dark:text-green-400' : 'text-blue-600 dark:text-blue-400'} uppercase tracking-wider mb-0.5">
                                    ${isEntry ? 'Entrada' : 'Saída'}
                                </p>
                                <p class="text-xs text-slate-400">${timeStr}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                lucide.createIcons();
            }

            // -------------------------
            // Lógica dos Modais e UI
            // -------------------------
            setupModals() {
                // Modal de Check-in (Dar Entrada)
                const btnCheckin = document.getElementById('btnCheckin');
                const modalCheckin = document.getElementById('modalCheckin');
                const contentCheckin = document.getElementById('modalCheckinContent');

                btnCheckin.addEventListener('click', () => {
                    this.openModal(modalCheckin, contentCheckin);
                    document.getElementById('searchClientInput').value = '';
                    this.renderClientsSearch('');
                    setTimeout(() => document.getElementById('searchClientInput').focus(), 100);
                });

                // Modal de Check-out (Finalizar Uso)
                const btnCheckout = document.getElementById('btnCheckout');
                const modalCheckout = document.getElementById('modalCheckout');
                const contentCheckout = document.getElementById('modalCheckoutContent');

                btnCheckout.addEventListener('click', () => {
                    this.openModal(modalCheckout, contentCheckout);
                    document.getElementById('searchParkedInput').value = '';
                    this.renderParkedSearch('');
                    setTimeout(() => document.getElementById('searchParkedInput').focus(), 100);
                });

                // Botões universais de fechar: fecham qualquer modal aberto
                document.querySelectorAll('.modal-close').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.closeModal(modalCheckin, contentCheckin);
                        this.closeModal(modalCheckout, contentCheckout);

                        // Limpa os formulários ao fechar
                        this.clearCheckinSelection();
                        document.getElementById('btnConfirmCheckout').disabled = true;

                    });
                });
            }

            openModal(modalBg, modalContent) {
                modalBg.classList.remove('hidden');
                // helper para forçar reflow do navegador (garante animação CSS)
                void modalBg.offsetWidth;
                modalBg.classList.add('opacity-100');
                modalBg.classList.remove('opacity-0');

                modalContent.classList.add('scale-100', 'opacity-100');
                modalContent.classList.remove('scale-95', 'opacity-0');
            }

            closeModal(modalBg, modalContent) {
                modalBg.classList.add('opacity-0');
                modalBg.classList.remove('opacity-100');

                modalContent.classList.add('scale-95', 'opacity-0');
                modalContent.classList.remove('scale-100', 'opacity-100');

                setTimeout(() => {
                    modalBg.classList.add('hidden');
                }, 300);
            }

            // -------------------------
            // Lógica de ENTRADA (Dar Entrada)
            // -------------------------
            setupCheckinSearch() {
                const searchInput = document.getElementById('searchClientInput');
                const listContainer = document.getElementById('clientsSelectList');
                const clearBtn = document.getElementById('clearSelectionBtn');
                const form = document.getElementById('formCheckin');

                searchInput.addEventListener('focus', () => {
                    listContainer.classList.remove('hidden');
                    this.renderClientsSearch(searchInput.value);
                });

                searchInput.addEventListener('input', (e) => {
                    listContainer.classList.remove('hidden');
                    this.renderClientsSearch(e.target.value);
                });

                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target) && !listContainer.contains(e.target)) {
                        listContainer.classList.add('hidden');
                    }
                });

                clearBtn.addEventListener('click', () => {
                    this.clearCheckinSelection();
                    searchInput.focus();
                });

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.processCheckin();
                });
            }

            renderClientsSearch(query) {
                const listContainer = document.getElementById('clientsSelectList');
                const queryTerm = (query || '').trim();

                if (!queryTerm) {
                    listContainer.classList.add('hidden');
                    return;
                }

                listContainer.classList.remove('hidden');
                const searchTerm = queryTerm.toLowerCase();

                // Lista plana de todos os clientes com suas bicicletas
                let actionableItems = [];
                this.allClients.forEach(client => {
                    if (client.bicicletas && client.bicicletas.length > 0) {
                        client.bicicletas.forEach(bike => {
                            actionableItems.push({ client, bike });
                        });
                    }
                });

                // Filtra por nome do cliente, CPF ou modelo da bike
                let filtered = actionableItems.filter(item => {
                    const cName = item.client.nome.toLowerCase();
                    const cCpf = (item.client.cpf || '').toLowerCase();
                    const bModel = item.bike.modelo.toLowerCase();
                    return cName.includes(searchTerm) || cCpf.includes(searchTerm) || bModel.includes(searchTerm);
                });

                // Limita resultados para não sobrecarregar a lista
                filtered = filtered.slice(0, 15);

                if (filtered.length === 0) {
                    listContainer.innerHTML = '<div class="p-4 text-center text-sm text-slate-500">Nenhum cliente/bicicleta encontrado.</div>';
                    return;
                }

                listContainer.innerHTML = filtered.map(item => {
                    return `
                        <div class="px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer border-b border-slate-100 dark:border-slate-700/50 flex justify-between items-center transition-colors" 
                             onclick="window.app.selectCheckinItem('${item.client.id}', '${item.bike.id}')">
                            <div>
                                <p class="text-sm font-bold text-slate-800 dark:text-white">${item.client.nome}</p>
                                <p class="text-xs text-slate-500"><i data-lucide="bike" class="w-3 h-3 inline"></i> ${item.bike.modelo} - ${item.bike.cor}</p>
                            </div>
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            }

            selectCheckinItem(clientId, bikeId) {
                const client = this.allClients.find(c => c.id === clientId);
                const bike = client.bicicletas.find(b => b.id === bikeId);

                // Preenche os campos ocultos com os IDs e dados da bike selecionada
                document.getElementById('entryClientId').value = clientId;
                document.getElementById('entryBikeId').value = bikeId;
                document.getElementById('entryClientCat').value = client.categoria || '';
                document.getElementById('entryBikeModel').value = bike.modelo || '';
                document.getElementById('entryBikeBrand').value = bike.marca || '';
                document.getElementById('entryBikeColor').value = bike.cor || '';

                // UI Flip
                document.getElementById('searchClientInput').classList.add('hidden');
                document.getElementById('clientsSelectList').classList.add('hidden');

                const displayArea = document.getElementById('selectedClientDisplay');
                document.getElementById('selectedClientName').textContent = client.nome;
                document.getElementById('selectedBikeDesc').textContent = `${bike.modelo} (${bike.marca} - ${bike.cor})`;

                displayArea.classList.remove('hidden');

                // Habilita o botão de confirmar após selecionar
                document.getElementById('btnConfirmCheckin').disabled = false;
            }

            clearCheckinSelection() {
                document.getElementById('entryClientId').value = '';
                document.getElementById('searchClientInput').value = '';
                document.getElementById('searchClientInput').classList.remove('hidden');
                document.getElementById('selectedClientDisplay').classList.add('hidden');
                document.getElementById('btnConfirmCheckin').disabled = true;
            }

            async processCheckin() {
                const clientId = document.getElementById('entryClientId').value;
                const bikeId = document.getElementById('entryBikeId').value;

                if (!clientId || !bikeId) return;

                const newRegistro = {
                    id: Utils.generateUUID(),
                    dataHoraEntrada: Utils.getLocalISOString(),
                    dataHoraSaida: null,
                    clientId: clientId,
                    bikeId: bikeId,
                    categoria: document.getElementById('entryClientCat').value,
                    bikeSnapshot: {
                        modelo: document.getElementById('entryBikeModel').value,
                        marca: document.getElementById('entryBikeBrand').value,
                        cor: document.getElementById('entryBikeColor').value
                    },
                    origem: 'dashboard'
                };

                // Salva o registro (mesma lógica do núcleo do sistema)
                this.allRegistros.push(newRegistro);
                await Storage.saveRegistros(this.allRegistros);

                notificationManager.onClientActivity();

                // Fecha o modal e limpa a seleção
                this.closeModal(document.getElementById('modalCheckin'), document.getElementById('modalCheckinContent'));
                this.clearCheckinSelection();

                await this.refreshData();
            }


            // -------------------------
            // Lógica de SAÍDA (Finalizar Uso)
            // -------------------------
            setupCheckoutSearch() {
                const searchInput = document.getElementById('searchParkedInput');
                const listContainer = document.getElementById('parkedSelectList');
                const form = document.getElementById('formCheckout');

                searchInput.addEventListener('input', (e) => {
                    this.renderParkedSearch(e.target.value);
                });

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.processCheckout();
                });
            }

            renderParkedSearch(query) {
                const listContainer = document.getElementById('parkedSelectList');
                const queryTerm = (query || '').trim();

                if (!queryTerm) {
                    listContainer.classList.add('hidden');
                    return;
                }

                listContainer.classList.remove('hidden');
                const searchTerm = queryTerm.toLowerCase();

                let filtered = this.activeRegistros.filter(r => {
                    const client = this.allClients.find(c => c.id === r.clientId) || { nome: '', cpf: '' };
                    const cName = client.nome.toLowerCase();
                    const bModel = r.bikeSnapshot ? r.bikeSnapshot.modelo.toLowerCase() : '';
                    return cName.includes(searchTerm) || bModel.includes(searchTerm);
                });

                if (filtered.length === 0) {
                    listContainer.innerHTML = '<div class="p-4 text-center text-sm text-slate-500">Nenhuma bicicleta estacionada corresponde.</div>';
                    return;
                }

                // Renderiza como botões radio nativos para seleção
                listContainer.innerHTML = filtered.map(r => {
                    const client = this.allClients.find(c => c.id === r.clientId) || { nome: 'Desconhecido', cpf: '' };
                    const timeIn = new Date(r.dataHoraEntrada).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    const bikeDesc = r.bikeSnapshot ? `${r.bikeSnapshot.modelo} (${r.bikeSnapshot.cor})` : 'Bike';

                    return `
                        <label class="px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer border-b border-slate-100 dark:border-slate-700/50 flex items-center gap-3 transition-colors">
                            <input type="radio" name="checkoutRecord" value="${r.id}" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700" onchange="window.app.activateCheckoutBtn()">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-slate-800 dark:text-white truncate">${client.nome}</p>
                                <div class="flex justify-between items-center mt-0.5">
                                    <p class="text-xs text-slate-500 truncate"><i data-lucide="bike" class="w-3 h-3 inline"></i> ${bikeDesc}</p>
                                    <span class="text-xs font-medium text-amber-500">📥 às ${timeIn}</span>
                                </div>
                            </div>
                        </label>
                    `;
                }).join('');
                lucide.createIcons();
            }

            activateCheckoutBtn() {
                document.getElementById('btnConfirmCheckout').disabled = false;
            }

            async processCheckout() {
                const selectedRadio = document.querySelector('input[name="checkoutRecord"]:checked');
                if (!selectedRadio) return;

                const registroId = selectedRadio.value;
                const recordIndex = this.allRegistros.findIndex(r => r.id === registroId);

                if (recordIndex !== -1) {
                    this.allRegistros[recordIndex].dataHoraSaida = Utils.getLocalISOString();
                    await Storage.saveRegistros(this.allRegistros);

                    notificationManager.onClientActivity();
                }

                // Fecha o modal e reseta o estado
                this.closeModal(document.getElementById('modalCheckout'), document.getElementById('modalCheckoutContent'));
                document.getElementById('btnConfirmCheckout').disabled = true;

                await this.refreshData();
            }


            // -------------------------
            // Ferramentas de Sessão
            // -------------------------
            setupLogout() {
                document.getElementById('btnLogout').addEventListener('click', () => {
                    Auth.logout();
                    window.location.href = '/login.html';
                });
            }
        }

        // Inicializa o App e expõe no window para handlers inline do HTML
        window.app = new DashboardApp();
        document.addEventListener('DOMContentLoaded', () => {
            window.app.init();
        });

    </script>
</body>

</html>
